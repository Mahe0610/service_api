<div class="auth-layout">
  <div class="card auth-card">
    <h1>Employee Portal</h1>
    <p class="sub">Login if you already have an account, otherwise register.</p>

    <div class="tabs">
      <button [class.active]="mode === 'login'" (click)="switchMode('login')">Login</button>
      <button [class.active]="mode === 'register'" (click)="switchMode('register')">Register</button>
    </div>

    <form *ngIf="mode === 'login'" [formGroup]="loginForm" (ngSubmit)="submitLogin()">
      <label>Email (or admin username)</label>
      <input formControlName="identifier" type="text" />
      <label>Password</label>
      <input formControlName="password" type="password" />
      <button class="btn-primary" type="submit">Login</button>
    </form>

    <form *ngIf="mode === 'register'" [formGroup]="registerForm" (ngSubmit)="submitRegister()">
      <label>Password</label>
      <input formControlName="password" type="password" />
      <label>Name</label>
      <input formControlName="employeeName" type="text" />
      <label>Date of Birth</label>
      <input formControlName="dob" type="date" />
      <label>Address</label>
      <input formControlName="address" type="text" />
      <label>Email</label>
      <input formControlName="email" type="email" />
      <label>Salary</label>
      <input formControlName="salary" type="number" />
      <button class="btn-primary" type="submit">Create Account</button>
    </form>

    <div class="error" *ngIf="error">{{ error }}</div>
  </div>
</div>
