<div class="dashboard">
  <div class="card">
    <div class="top">
      <div>
        <h2>Dashboard</h2>
        <p *ngIf="session">Welcome, {{ session.name }} ({{ session.role }})</p>
      </div>
      <button (click)="logout()">Logout</button>
    </div>

    <div class="search-wrap" *ngIf="isAdmin">
      <input [(ngModel)]="search" placeholder="Search by name, username, email, code, scanner" />
      <button class="btn-primary" (click)="fetch()">Search</button>
    </div>

    <div class="grid-wrap">
      <table>
        <thead>
          <tr>
            <th>Name</th>
            <th>Email</th>
            <th>Address</th>
            <th>DOB</th>
            <th *ngIf="isAdmin">Salary</th>
            <th *ngIf="isAdmin">Manage</th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let e of employees">
            <td>{{ e.employeeName }}</td>
            <td>{{ e.email }}</td>
            <td>{{ e.address }}</td>
            <td>{{ e.dob | date: 'yyyy-MM-dd' }}</td>
            <td *ngIf="isAdmin">{{ e.salary ?? 'N/A' }}</td>
            <td class="actions" *ngIf="isAdmin">
              <button (click)="openEdit(e)">Edit</button>
              <button class="danger" (click)="deleteUser(e.id)">Delete</button>
            </td>
          </tr>
        </tbody>
      </table>
    </div>

    <div class="edit-box" *ngIf="isAdmin && editRecord">
      <h3>Edit User</h3>
      <div class="edit-grid">
        <input [(ngModel)]="editRecord.employeeName" placeholder="Name" />
        <input [(ngModel)]="editRecord.email" placeholder="Email" />
        <input [(ngModel)]="editRecord.address" placeholder="Address" />
        <input [(ngModel)]="editRecord.dob" type="date" />
        <input [(ngModel)]="editRecord.salary" type="number" placeholder="Salary" />
      </div>
      <div class="actions">
        <button class="btn-primary" (click)="saveEdit()">Save</button>
        <button (click)="editRecord = null">Cancel</button>
      </div>
    </div>

    <div class="error" *ngIf="error">{{ error }}</div>
  </div>
</div>
